<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060608; color:#fff; font-family:'Inter',sans-serif; }

/* ── HERO ── */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  overflow: hidden;
  background: #070b09;
}

.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(46,204,113,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,204,113,.045) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none; z-index: 0;
}

.hero-glow {
  position: absolute; bottom: -120px; left: -80px;
  width: 650px; height: 650px;
  background: radial-gradient(circle, rgba(46,204,113,.22) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}
.hero-glow-tr {
  position: absolute; top: -80px; right: -60px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(255,61,127,.1) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* Corner brackets */
.bk { position: absolute; width: 26px; height: 26px; z-index: 10; }
.bk::before, .bk::after { content:''; position:absolute; background:#2ecc71; }
.bk.tl { top:26px; left:26px; }
.bk.tl::before { top:0;left:0;width:100%;height:2px; }
.bk.tl::after  { top:0;left:0;width:2px;height:100%; }
.bk.tr { top:26px; right:26px; }
.bk.tr::before { top:0;right:0;width:100%;height:2px; }
.bk.tr::after  { top:0;right:0;width:2px;height:100%; }
.bk.bl { bottom:26px; left:26px; }
.bk.bl::before { bottom:0;left:0;width:100%;height:2px; }
.bk.bl::after  { bottom:0;left:0;width:2px;height:100%; }
.bk.br { bottom:26px; right:26px; }
.bk.br::before { bottom:0;right:0;width:100%;height:2px; }
.bk.br::after  { bottom:0;right:0;width:2px;height:100%; }

/* SVG Chart */
.hero-chart {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 62%; height: 100%;
  pointer-events: none; z-index: 1;
}

/* Top bar */
.hero-topbar {
  position: absolute; top: 34px; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 62px; z-index: 10;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700; letter-spacing: .25em;
}
.live {
  display: flex; align-items: center; gap: 9px; color: #fff;
}
.live-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #ff3d7f;
  box-shadow: 0 0 0 3px rgba(255,61,127,.2), 0 0 10px rgba(255,61,127,.5);
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.pro-badge {
  background: rgba(255,204,0,.1); border: 1px solid rgba(255,204,0,.32);
  padding: 5px 16px; border-radius: 100px;
  color: #ffcc00; font-size: 11px; letter-spacing: .18em;
  display: flex; align-items: center; gap: 7px;
}
.pro-badge::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:#ffcc00; box-shadow:0 0 6px #ffcc00;
}

/* Main content */
.hero-body {
  position: relative; z-index: 5;
  padding: 0 62px;
  width: 100%; max-width: 1200px;
}

.kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700; letter-spacing: .32em;
  color: #ff3d7f; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.kicker::before, .kicker::after { content:''; width:22px; height:2px; background:#ff3d7f; }

.hero-title {
  font-size: clamp(72px, 12vw, 148px);
  font-weight: 900;
  line-height: .88;
  letter-spacing: -.03em;
  text-transform: uppercase;
  margin-bottom: 30px;
}
.hero-title .t1 { display:block; color:#ffffff; }
.hero-title .t2 {
  display: block;
  background: linear-gradient(180deg, #7fffb8 0%, #2ecc71 45%, #0e7035 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

.hero-sub {
  font-size: 16px; color: rgba(255,255,255,.45);
  max-width: 400px; margin-bottom: 36px; line-height: 1.65;
}

.hero-pills { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 44px; }
.hp {
  padding: 10px 24px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; letter-spacing: .12em;
}
.hp-pink  { background: rgba(255,61,127,.12);  border:1px solid rgba(255,61,127,.4);  color:#ff3d7f; }
.hp-cyan  { background: rgba(77,201,240,.07);  border:1px solid rgba(77,201,240,.3);  color:rgba(255,255,255,.75); }
.hp-green { background: rgba(46,204,113,.08);  border:1px solid rgba(46,204,113,.3);  color:#2ecc71; }

.hero-chips { display: flex; gap: 10px; flex-wrap: wrap; }
.chip {
  background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  border-radius: 10px; padding: 9px 18px;
  font-size: 13px; color: rgba(255,255,255,.65);
  font-family: 'JetBrains Mono', monospace; letter-spacing: .05em;
}

/* Bottom bar */
.hero-bottombar {
  position: absolute; bottom: 32px; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 62px; z-index: 10;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: .28em;
  text-transform: uppercase; color: rgba(255,255,255,.28);
}
.hero-bottombar-r { display:flex; align-items:center; gap:8px; }
.hero-bottombar-r::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:#2ecc71; box-shadow:0 0 6px #2ecc71;
}

/* ── BANNER GENERATOR ── */
.gen-wrap {
  background: #060608;
  border-top: 1px solid rgba(255,255,255,.06);
  padding: 60px 20px 72px;
  display: flex; flex-direction: column; align-items: center; gap: 22px;

.gen-label {

  font-size: 11px; font-weight: 700; letter-spacing: .32em;
  color: rgba(255,255,255,.2); text-transform: uppercase;

.preview-wrap {

  border: 1px solid rgba(255,255,255,.08);

canvas#preview { width:700px; height:394px; display:block; }
canvas#export  { display:none; }
.btn-row { display:flex; gap:12px; }
.dl-btn {
  background:#2ecc71; color:#000; border:none;
  padding:13px 36px; border-radius:10px;
  font-size:14px; font-weight:800; cursor:pointer;
  font-family:'Inter',sans-serif; transition:opacity .15s;
}
.dl-btn:hover { opacity:.85; }
.copy-btn {
  background:#1a1a24; color:#4dc9f0;
  border:1px solid rgba(77,201,240,.25);
  padding:13px 28px; border-radius:10px;
  font-size:14px; font-weight:700; cursor:pointer;
  font-family:'JetBrains Mono',monospace; transition:opacity .15s;
}
.copy-btn:hover { opacity:.85; }

@media(max-width:760px){
  .hero-body { padding:0 28px; }
  .hero-topbar,.hero-bottombar { padding:0 28px; }
  .hero-title { font-size:68px; }
  .hero-chart { width:100%; opacity:.18; }
  .preview-wrap { width:100%; height:auto; aspect-ratio:16/9; }
  canvas#preview { width:100%; height:auto; }
}
</style>

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawBanner(ctx, W, H) {
  // Background
  ctx.fillStyle = '#08080c';
  ctx.fillRect(0, 0, W, H);

  // Green glow bottom-left
  const g1 = ctx.createRadialGradient(W*0.18, H*0.85, 0, W*0.18, H*0.85, W*0.55);
  g1.addColorStop(0, 'rgba(46,204,113,0.22)');
  g1.addColorStop(1, 'rgba(46,204,113,0)');
  ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);

  // Pink glow top-right
  const g2 = ctx.createRadialGradient(W*0.88, H*0.12, 0, W*0.88, H*0.12, W*0.4);
  g2.addColorStop(0, 'rgba(255,61,127,0.14)');
  g2.addColorStop(1, 'rgba(255,61,127,0)');
  ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = 'rgba(46,204,113,0.04)'; ctx.lineWidth = 1;
  for (let x=0; x<W; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // ── CHART (right side) ──────────────────────────────────────
  // Chart area: starts at ~42% width, occupies right 56%
  // Candle data: [centerX_frac, wickTop_frac, wickBot_frac, bodyTop_frac, bodyBot_frac, bull]
  // fractions are of chart height (top=0, bot=1)
  const chX = W * 0.41;   // chart left edge
  const chY = H * 0.07;   // chart top
  const chW = W * 0.56;   // chart width
  const chH = H * 0.78;   // chart height (leaves room for volumes)
  const volY = chY + chH + H*0.02; // volume bar top
  const volH = H * 0.08;  // volume bar max height
  const bw  = chW * 0.048; // candle body half-width

  // [x_frac, wt, wb, bt, bb, bull, vol_frac]
  const CD = [
    [0.06, 0.74, 0.60, 0.63, 0.71, true,  0.38],
    [0.15, 0.69, 0.53, 0.56, 0.67, true,  0.50],
    [0.24, 0.58, 0.46, 0.47, 0.55, false, 0.33],
    [0.33, 0.62, 0.40, 0.42, 0.58, true,  0.60],
    [0.42, 0.52, 0.30, 0.33, 0.49, true,  0.68],
    [0.51, 0.40, 0.18, 0.21, 0.37, true,  0.78],
    [0.60, 0.34, 0.12, 0.15, 0.30, true,  0.85],
    [0.69, 0.12, 0.28, 0.14, 0.26, false, 0.44],
    [0.78, 0.24, 0.42, 0.26, 0.40, false, 0.65],
    [0.87, 0.38, 0.58, 0.40, 0.55, false, 0.55],
    [0.96, 0.53, 0.66, 0.55, 0.63, false, 0.38],
  ];

  // Faint horizontal grid lines
  ctx.lineWidth = 1;
  [0.2, 0.4, 0.6, 0.8].forEach(f => {
    ctx.strokeStyle = 'rgba(255,255,255,0.055)';
    ctx.beginPath(); ctx.moveTo(chX, chY + f*chH); ctx.lineTo(chX+chW, chY + f*chH); ctx.stroke();
  });

  // SM dashed levels
  ctx.setLineDash([6,6]);
  ctx.strokeStyle = 'rgba(46,204,113,0.22)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(chX, chY+chH*0.25); ctx.lineTo(chX+chW, chY+chH*0.25); ctx.stroke();
  ctx.strokeStyle = 'rgba(46,204,113,0.14)';
  ctx.beginPath(); ctx.moveTo(chX, chY+chH*0.62); ctx.lineTo(chX+chW, chY+chH*0.62); ctx.stroke();
  ctx.setLineDash([]);

  // Volume bars
  CD.forEach(([xf,,,,, bull, vf]) => {
    const bx = chX + xf * chW;
    const color = bull ? 'rgba(46,204,113,0.18)' : 'rgba(255,61,127,0.14)';
    ctx.fillStyle = color;
    const vh = volH * vf;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx-bw, volY + volH - vh, bw*2, vh, 2)
                  : ctx.rect(bx-bw, volY + volH - vh, bw*2, vh);
    ctx.fill();
  });

  // Candle bodies + wicks
  CD.forEach(([xf, wt, wb, bt, bb, bull]) => {
    const bx = chX + xf * chW;
    const color = bull ? '#2ecc71' : '#ff3d7f';
    const alpha = bull ? 0.88 : 0.82;
    ctx.globalAlpha = alpha;
    // Wick
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, chY + wt * chH);
    ctx.lineTo(bx, chY + wb * chH);
    ctx.stroke();
    // Body
    const by = chY + bt * chH;
    const bh = (bb - bt) * chH || 3;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx-bw, by, bw*2, bh, 2)
                  : ctx.fillRect(bx-bw, by, bw*2, bh);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Smooth bezier trend line (through close prices)
  // close = bull ? bodyTop : bodyBot
  const tPts = CD.map(([xf,,,,bb,,, ] , i) => {
    const [xf2, wt, wb, bt, bb2, bull] = CD[i];
    return [chX + xf2 * chW, chY + (bull ? bt : bb2) * chH];
  });
  ctx.beginPath();
  ctx.strokeStyle = '#ff3d7f'; ctx.lineWidth = 3.5;
  ctx.globalAlpha = 0.95; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  tPts.forEach(([px,py], i) => {
    if (i === 0) { ctx.moveTo(px, py); return; }
    // smooth bezier using previous & next midpoints
    const [px0, py0] = tPts[i-1];
    const cpx = (px0 + px) / 2;
    ctx.bezierCurveTo(cpx, py0, cpx, py, px, py);
  });
  ctx.stroke(); ctx.globalAlpha = 1;

  // Fade left over chart
  const fadeL = ctx.createLinearGradient(chX-10, 0, chX + chW*0.28, 0);
  fadeL.addColorStop(0,'rgba(8,8,12,1)');
  fadeL.addColorStop(1,'rgba(8,8,12,0)');
  ctx.fillStyle = fadeL; ctx.fillRect(chX-10, 0, chW*0.32, H);

  // Corner brackets
  ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 5; ctx.globalAlpha = 0.85;
  const bs=32, bp=10;
  ctx.beginPath(); ctx.moveTo(bp+bs,bp); ctx.lineTo(bp,bp); ctx.lineTo(bp,bp+bs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-bp-bs,bp); ctx.lineTo(W-bp,bp); ctx.lineTo(W-bp,bp+bs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bp+bs,H-bp); ctx.lineTo(bp,H-bp); ctx.lineTo(bp,H-bp-bs); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-bp-bs,H-bp); ctx.lineTo(W-bp,H-bp); ctx.lineTo(W-bp,H-bp-bs); ctx.stroke();
  ctx.globalAlpha = 1;

  // IT V3 badge (top-right)
  const bt='IT V3'; ctx.font='bold 13px JetBrains Mono,monospace';
  const bw2=ctx.measureText(bt).width+32, bh2=28;
  const bx2=W-bw2-28, by2=24;
  ctx.fillStyle='rgba(46,204,113,0.12)'; roundRect(ctx,bx2,by2,bw2,bh2,14); ctx.fill();
  ctx.strokeStyle='rgba(46,204,113,0.45)'; ctx.lineWidth=1; roundRect(ctx,bx2,by2,bw2,bh2,14); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx2+14,by2+bh2/2,3.5,0,Math.PI*2);
  ctx.fillStyle='#2ecc71'; ctx.shadowColor='#2ecc71'; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#2ecc71'; ctx.textAlign='left'; ctx.fillText(bt,bx2+24,by2+19);

  // LIVE dot + label (top-left)
  ctx.beginPath(); ctx.arc(54,38,5,0,Math.PI*2);
  ctx.fillStyle='#ff3d7f'; ctx.shadowColor='#ff3d7f'; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
  ctx.font='bold 11px JetBrains Mono,monospace';
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.textAlign='left';
  ctx.fillText('LIVE',70,42);

  // Kicker
  ctx.font='bold 14px JetBrains Mono,monospace';
  ctx.fillStyle='#ff3d7f'; ctx.textAlign='left'; ctx.globalAlpha=0.92;
  ctx.fillText('— ИНДИКАТОР —',54,90); ctx.globalAlpha=1;

  // Main headline "IT v3"
  ctx.font='900 130px Inter,sans-serif';
  ctx.textAlign='left';
  const tg=ctx.createLinearGradient(54,H*0.2,54,H*0.55);
  tg.addColorStop(0,'#ffffff');
  tg.addColorStop(0.6,'rgba(255,255,255,0.88)');
  tg.addColorStop(1,'rgba(255,255,255,0.55)');
  ctx.fillStyle=tg;
  ctx.fillText('IT v3',54,H*0.52);

  // "ОТ ТОВАРИЩА" sub-headline
  ctx.font='900 52px Inter,sans-serif';
  const tg2=ctx.createLinearGradient(54,H*0.56,54,H*0.68);
  tg2.addColorStop(0,'#7fffb8');
  tg2.addColorStop(1,'#2ecc71');
  ctx.fillStyle=tg2;
  ctx.fillText('ГЛОБАЛЬНЫЙ АПДЕЙТ',54,H*0.64);

  // Date pill
  const dateText='⏰  07 МАЯ — ЗАПУСК';
  ctx.font='bold 13px JetBrains Mono,monospace';
  const dpw=ctx.measureText(dateText).width+38, dph=36;
  const dpx=54, dpy=H*0.7;
  ctx.fillStyle='rgba(255,61,127,0.12)'; roundRect(ctx,dpx,dpy,dpw,dph,18); ctx.fill();
  ctx.strokeStyle='rgba(255,61,127,0.4)'; ctx.lineWidth=1; roundRect(ctx,dpx,dpy,dpw,dph,18); ctx.stroke();
  ctx.fillStyle='#ff3d7f'; ctx.textAlign='left';
  ctx.fillText(dateText,dpx+19,dpy+24);

  // Feature chips
  const feats=[{i:'📊',l:'Новый индикатор'},{i:'⚡',l:'Сигналы 24/7'},{i:'📱',l:'Мини-апп'}];
  ctx.font='bold 12px JetBrains Mono,monospace';
  let fx=54; const fy=H*0.82, fh=32;
  feats.forEach(f=>{
    const label=f.i+'  '+f.l;
    const fw=ctx.measureText(label).width+28;
    ctx.fillStyle='rgba(255,255,255,0.06)'; roundRect(ctx,fx,fy,fw,fh,16); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; roundRect(ctx,fx,fy,fw,fh,16); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.textAlign='left';
    ctx.fillText(label,fx+14,fy+21);
    fx+=fw+12;
  });

  // Bottom bar
  ctx.font='400 14px Inter,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.textAlign='left';
  ctx.fillText('Подписчики PRO получают доступ первыми  💎',54,H-28);

  // PRO pill
  const proText='PRO FIRST';
  ctx.font='bold 11px JetBrains Mono,monospace';
  const ppw=ctx.measureText(proText).width+26, pph=26;
  const ppx=W-ppw-28, ppy=H-48;
  ctx.fillStyle='rgba(255,204,0,0.1)'; roundRect(ctx,ppx,ppy,ppw,pph,13); ctx.fill();
  ctx.strokeStyle='rgba(255,204,0,0.35)'; ctx.lineWidth=1; roundRect(ctx,ppx,ppy,ppw,pph,13); ctx.stroke();
  ctx.fillStyle='#ffcc00'; ctx.textAlign='left';
  ctx.fillText(proText,ppx+13,ppy+17);
}

function renderPreview(){
  const c=document.getElementById('preview');
  c.width=700; c.height=394;
  const ctx=c.getContext('2d');
  ctx.scale(700/1280,394/720);
  drawBanner(ctx,1280,720);
}

function downloadBanner(){
  const c=document.getElementById('export');
  c.width=1280; c.height=720;
  const ctx=c.getContext('2d');
  drawBanner(ctx,1280,720);
  c.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='IT_v3_global_update_banner.png';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
}

function copyPostText(){
  navigator.clipboard.writeText(POST_TEXT)
    .then(()=>alert('✅ Текст поста скопирован!'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=POST_TEXT; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); alert('✅ Текст поста скопирован!');
    });
}

renderPreview();
</script>
