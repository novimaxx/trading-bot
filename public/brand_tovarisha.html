<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>IT v3 — «Товарища» variants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --page-bg:#0a0a0c; --line:#1c1c22; --muted:#6b6b78; }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--page-bg);color:#d8d8e0;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
  .page{max-width:1480px;margin:0 auto;padding:64px 32px 120px}
  .page-header{border-bottom:1px solid var(--line);padding-bottom:28px;margin-bottom:48px;
    display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .page-header h1{margin:0;font-size:22px;font-weight:600;letter-spacing:-0.01em}
  .page-header .meta{font-family:"JetBrains Mono",monospace;font-size:11px;
    text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)}

  .variant{margin-bottom:80px}
  .variant-head{display:flex;align-items:baseline;gap:18px;margin-bottom:8px;flex-wrap:wrap}
  .variant-num{font-family:"JetBrains Mono",monospace;color:var(--muted);font-size:12px;letter-spacing:.18em}
  .variant-name{font-size:22px;font-weight:700;letter-spacing:-0.01em;margin:0}
  .variant-desc{color:var(--muted);font-size:13px;margin:0 0 22px 0;max-width:780px;line-height:1.55}
  .row{display:grid;grid-template-columns:1.6fr 1fr;gap:18px}
  @media(max-width:980px){.row{grid-template-columns:1fr}}
  .frame{background:#0e0e12;border:1px solid var(--line);border-radius:12px;padding:10px}
  .canvas-wrap-wide{width:100%;aspect-ratio:1280/640;border-radius:6px;overflow:hidden;position:relative}
  .canvas-wrap-sq{width:100%;aspect-ratio:1/1;border-radius:6px;overflow:hidden;position:relative}

  /* ============ BANNER ============ */
  .banner{
    position:relative;
    background:#0a0a0c;
    overflow:hidden;
    transform-origin:top left;
    color:#fff;
    font-family:"Inter",sans-serif;
    --accent:#2ecc71;
    --accent-deep:#126638;
    --accent2:#ff3d7f;
    --pillCol:#4dc9f0;       /* default pill color (cyan) */
    --glow:rgba(46,204,113,.30);
  }
  .banner.sq{ width:640px; height:640px; }
  .banner.wide{ width:1280px; height:640px; }

  .banner .glow{
    position:absolute;
    width:600px;height:500px;border-radius:50%;
    background:radial-gradient(circle, var(--glow) 0%, transparent 60%);
    left:50%;bottom:-200px;transform:translateX(-50%);
    filter:blur(60px);
    z-index:1;
  }
  .banner.wide .glow{ width:900px;height:700px;bottom:-300px; }

  .banner .bracket{
    position:absolute;width:18px;height:18px;
    border:2px solid var(--accent);
    z-index:6;
  }
  .banner .bracket.tl{top:22px;left:22px;border-right:none;border-bottom:none}
  .banner .bracket.tr{top:22px;right:22px;border-left:none;border-bottom:none}
  .banner .bracket.bl{bottom:22px;left:22px;border-right:none;border-top:none}
  .banner .bracket.br{bottom:22px;right:22px;border-left:none;border-top:none}

  .banner .topbar{
    position:absolute;top:38px;left:48px;right:48px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"JetBrains Mono",monospace;
    font-size:14px;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(255,255,255,.55);font-weight:500;
    z-index:6;
  }
  .banner.wide .topbar{ top:48px; left:64px; right:64px; font-size:13px; }
  .banner .topbar .live{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;letter-spacing:.28em}
  .banner .topbar .live::before{
    content:"";width:9px;height:9px;border-radius:50%;background:var(--accent2);
    box-shadow:0 0 0 4px color-mix(in oklab, var(--accent2) 22%, transparent);
  }

  .banner .chart{ position:absolute;inset:0;pointer-events:none;z-index:2; }
  .banner .chart .grid-bg{
    position:absolute;inset:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 95%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 30%, transparent 95%);
    opacity:.5;
  }
  .banner .chart svg{ position:absolute;inset:0;width:100%;height:100%; }

  .banner .center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 50px;
    z-index:5;
  }
  .banner.wide .center{ padding:0 80px; }
  .banner .kicker{
    font-family:"JetBrains Mono",monospace;
    font-size:18px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;
    color:var(--accent2);margin-bottom:18px;
    display:inline-flex;align-items:center;gap:14px;
  }
  .banner.wide .kicker{ font-size:16px; margin-bottom:24px; }
  .banner .kicker::before, .banner .kicker::after{
    content:"";width:24px;height:2px;background:var(--accent2);
  }

  .banner .title{
    font-family:"Inter",sans-serif;font-weight:900;
    font-size:96px;line-height:.92;letter-spacing:-.045em;
    color:#fff;margin:0;text-transform:uppercase;
  }
  .banner.wide .title{ font-size:144px; }
  .banner .title .by{ display:block; }

  .banner .footer{
    position:absolute;bottom:36px;left:48px;right:48px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"JetBrains Mono",monospace;
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(255,255,255,.5);
    z-index:6;
  }
  .banner.wide .footer{ bottom:48px; left:64px; right:64px; font-size:12px; }
  .banner .footer .meta-l, .banner .footer .meta-r{
    display:flex;align-items:center;gap:8px;
  }
  .banner .footer .meta-r::before{
    content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);
  }

  .banner .pill-row{
    position:absolute;
    bottom:78px;left:0;right:0;
    display:flex;justify-content:center;
    z-index:6;
  }
  .banner.wide .pill-row{ bottom:96px; }
  .banner .pair-pill{
    color:var(--pillCol);
    border:1.5px solid color-mix(in oklab, var(--pillCol) 55%, transparent);
    padding:9px 22px;
    background:color-mix(in oklab, var(--pillCol) 10%, transparent);
    border-radius:7px;
    font-family:"JetBrains Mono",monospace;
    font-weight:700;letter-spacing:.18em;font-size:15px;
  }
  .banner.wide .pair-pill{ font-size:17px; padding:10px 26px; }

  /* ============ TITLE VARIANTS ============ */

  /* T1: Solid green (current) */
  .t-solid .by{ color:var(--accent); }

  /* T2: Vertical gradient */
  .t-grad-v .by{
    background:linear-gradient(180deg, #6FFFB2 0%, #2ecc71 50%, #126638 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  /* T3: Diagonal mint→green gradient */
  .t-grad-mint .by{
    background:linear-gradient(135deg, #a7ffd0 0%, #2ecc71 60%, #16a34a 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  /* T4: Neon outline */
  .t-neon .by{
    color:transparent;
    -webkit-text-stroke: 3px #2ecc71;
    filter: drop-shadow(0 0 12px rgba(46,204,113,.55));
  }
  .banner.wide .t-neon .by{ -webkit-text-stroke-width: 4px; }

  /* T5: Chrome / metallic green */
  .t-chrome .by{
    background:linear-gradient(180deg,
      #d1ffd9 0%,
      #6fe2a0 22%,
      #2ecc71 45%,
      #0f5c2c 60%,
      #2ecc71 78%,
      #88e8ad 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  /* T6: Pop with white outer-stroke "sticker" feel */
  .t-sticker .by{
    color:#2ecc71;
    -webkit-text-stroke: 3px #fff;
    paint-order: stroke fill;
    filter: drop-shadow(0 6px 0 #0a0a0c) drop-shadow(0 8px 22px rgba(46,204,113,.4));
  }

</style>
</head>
<body>
<div class="page">
  <header class="page-header">
    <h1>IT v3 — «Товарища»: 6 вариантов</h1>
    <div class="meta">PILL = CYAN (\\u043F\\u043E \\u0443\\u043C\\u043E\\u043B\\u0447\\u0430\\u043D\\u0438\\u044E)</div>
  </header>

  <div id="root"></div>
</div>

<script>
function makePriceData(n, seed=1){
  const out = [];
  for(let i=0;i<n;i++){
    const trend = i * 1.4;
    const wave = Math.sin(i*0.4 + seed)*5 + Math.sin(i*0.18)*9;
    const noise = (Math.sin(i*1.7+seed*3.1)*0.5 + Math.sin(i*0.7+seed*2.3)*0.5)*3.5;
    const close = 100 + trend + wave + noise;
    const open = i===0 ? close : out[i-1].close;
    const high = Math.max(open, close) + Math.abs(Math.sin(i*1.3+seed))*3;
    const low  = Math.min(open, close) - Math.abs(Math.cos(i*1.1+seed))*3;
    out.push({open,high,low,close});
  }
  return out;
}

function chartCandles({W, H, count, padX, padTop, padBot}){
  const innerW = W - padX*2;
  const innerH = H - padTop - padBot;
  const data = makePriceData(count, 1);
  const minP = Math.min(...data.map(d=>d.low));
  const maxP = Math.max(...data.map(d=>d.high));
  const range = maxP - minP;
  const step = innerW / count;
  const candleW = step * 0.55;
  const y = (p) => padTop + innerH - ((p - minP)/range) * innerH;
  const x = (i) => padX + step*(i + 0.5);

  let candles = '';
  data.forEach((d,i)=>{
    const cx = x(i);
    const up = d.close >= d.open;
    const color = up ? 'var(--accent)' : 'var(--accent2)';
    const bodyTop = y(Math.max(d.open, d.close));
    const bodyBot = y(Math.min(d.open, d.close));
    const bodyH = Math.max(2, bodyBot - bodyTop);
    candles += `
      <line x1="${cx}" y1="${y(d.high)}" x2="${cx}" y2="${y(d.low)}" stroke="${color}" stroke-width="1.5" opacity=".7"/>
      <rect x="${cx - candleW/2}" y="${bodyTop}" width="${candleW}" height="${bodyH}" fill="${color}" opacity=".75" rx="1"/>
    `;
  });
  let trend = '';
  data.forEach((d,i)=>{
    trend += (i===0 ? 'M' : 'L') + ` ${x(i)} ${y(d.close)} `;
  });
  return `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <g style="mask:linear-gradient(180deg, rgba(0,0,0,.95) 0%, rgba(0,0,0,.95) 18%, rgba(0,0,0,.30) 38%, rgba(0,0,0,.30) 62%, rgba(0,0,0,.95) 82%, rgba(0,0,0,.95) 100%)">
        ${candles}
      </g>
      <path d="${trend}" fill="none" stroke="var(--accent2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
            opacity=".85" filter="drop-shadow(0 0 8px rgba(255,61,127,.6))"
            style="mask:linear-gradient(180deg, rgba(0,0,0,.95) 0%, rgba(0,0,0,.95) 25%, rgba(0,0,0,.40) 45%, rgba(0,0,0,.40) 60%, rgba(0,0,0,.95) 80%, rgba(0,0,0,.95) 100%)"/>
    </svg>
  `;
}

function bannerWide(titleClass){
  return `
    <div class="banner wide ${titleClass}">
      <div class="glow"></div>
      <div class="bracket tl"></div><div class="bracket tr"></div>
      <div class="bracket bl"></div><div class="bracket br"></div>
      <div class="chart"><div class="grid-bg"></div>
        ${chartCandles({W:1280, H:640, count:48, padX:80, padTop:130, padBot:150})}
      </div>
      <div class="topbar"><div class="live">LIVE · PRO SIGNALS</div><div>v3</div></div>
      <div class="center">
        <div class="kicker">Индикатор</div>
        <h2 class="title">от <span class="by">Товарища</span></h2>
      </div>
      <div class="pill-row"><span class="pair-pill">BTC · ETH · SOL</span></div>
      <div class="footer"><div class="meta-l">IT V3</div><div class="meta-r">TRADINGVIEW</div></div>
    </div>
  `;
}
function bannerSq(titleClass){
  return `
    <div class="banner sq ${titleClass}">
      <div class="glow"></div>
      <div class="bracket tl"></div><div class="bracket tr"></div>
      <div class="bracket bl"></div><div class="bracket br"></div>
      <div class="chart"><div class="grid-bg"></div>
        ${chartCandles({W:640, H:640, count:22, padX:60, padTop:130, padBot:150})}
      </div>
      <div class="topbar"><div class="live">LIVE</div><div>v3</div></div>
      <div class="center">
        <div class="kicker">Индикатор</div>
        <h2 class="title">от <span class="by">Товарища</span></h2>
      </div>
      <div class="pill-row"><span class="pair-pill">BTC · ETH · SOL</span></div>
      <div class="footer"><div class="meta-l">IT V3</div><div class="meta-r">TRADINGVIEW</div></div>
    </div>
  `;
}

const variants = [
  { id:'T1', name:'Solid green',
    desc:'Текущий: чистый плоский #2ecc71. Простой и читаемый.',
    cls:'t-solid' },
  { id:'T2', name:'Vertical gradient (mint → forest)',
    desc:'От светло-мятного сверху к тёмно-лесному снизу. «3D» ощущение объёма.',
    cls:'t-grad-v' },
  { id:'T3', name:'Diagonal mint → green',
    desc:'Диагональный градиент свежего мятного к насыщенному зелёному. Живо, как Apple Liquid.',
    cls:'t-grad-mint' },
  { id:'T4', name:'Neon outline',
    desc:'Только зелёная обводка с глоу — гипер-минимализм, выглядит «технологично».',
    cls:'t-neon' },
  { id:'T5', name:'Chrome / metallic',
    desc:'Хромированный градиент с бликами — буквы как из металла. Заметнее всего привлекает внимание.',
    cls:'t-chrome' },
  { id:'T6', name:'Sticker (white stroke + drop)',
    desc:'Зелёная заливка + белая обводка + тёмный drop — «наклейка», поп-арт. Самый «инстаграмный» вариант.',
    cls:'t-sticker' },
];

const root = document.getElementById('root');
root.innerHTML = variants.map(v => `
  <section class="variant">
    <div class="variant-head">
      <div class="variant-num">${v.id}</div>
      <h2 class="variant-name">${v.name}</h2>
    </div>
    <p class="variant-desc">${v.desc}</p>
    <div class="row">
      <div class="frame">
        <div class="canvas-wrap-wide">${bannerWide(v.cls)}</div>
      </div>
      <div class="frame">
        <div class="canvas-wrap-sq">${bannerSq(v.cls)}</div>
      </div>
    </div>
  </section>
`).join('');

function scaleAll(){
  document.querySelectorAll('.canvas-wrap-wide, .canvas-wrap-sq').forEach(wrap=>{
    const banner = wrap.querySelector('.banner');
    if(!banner) return;
    const baseW = wrap.classList.contains('canvas-wrap-wide') ? 1280 : 640;
    banner.style.transform = `scale(${wrap.clientWidth / baseW})`;
  });
}
scaleAll();
window.addEventListener('resize', scaleAll);
</script>
</body>
</html>

<style id="__om-edit-overrides">
.canvas-wrap-sq >.t-solid >.topbar >div:nth-child(2) { opacity: 100 !important }
.canvas-wrap-sq >.t-solid >.topbar >div:nth-child(2) { opacity: 0 !important }
.canvas-wrap-sq >.t-solid >.topbar >div:nth-child(2) { opacity: 1 !important }
</style>
